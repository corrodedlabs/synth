<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Card Game</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #faf8f5;
        touch-action: none; /* Prevent default touch actions like pull-to-refresh */
      }
      canvas {
        display: block;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
      #score-display {
        position: absolute;
        top: 20px;
        right: 20px;
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 18px;
        color: #333333;
        background: rgba(250, 248, 245, 0.85);
        padding: 12px 20px;
        border-radius: 4px;
        pointer-events: none;
        letter-spacing: 0.5px;
      }
      #score-display .label {
        opacity: 0.7;
      }
      #score-display .value {
        font-weight: bold;
      }
      #score-display .divider {
        margin: 0 12px;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-layer">
      <div id="score-display">
        <span class="label">Score:</span> <span id="score-value" class="value">0</span>
        <span class="divider">|</span>
        <span class="label">Tricks:</span> <span id="tricks-value" class="value">0</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
